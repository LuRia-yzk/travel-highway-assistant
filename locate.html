<!DOCTYPE html>
<html>
<head>
    <title>旅游定位 + 地图显示</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; margin: 0; }
        h1 { font-size: 1.5rem; color: #333; }
        button { background: #007bff; color: white; border: none; padding: 12px 20px; border-radius: 6px; font-size: 1rem; width: 100%; cursor: pointer; margin-bottom: 15px; }
        #result { margin-bottom: 15px; padding: 15px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); min-height: 80px; word-break: break-word; }
        #mapContainer { width: 100%; height: 300px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .info { color: #666; font-size: 0.9rem; margin-top: 15px; border-top: 1px solid #ddd; padding-top: 10px; }
    </style>

    <!-- ========== 高德地图 JSAPI 配置（需要你的 Web端 Key 和安全密钥） ========== -->
    <script type="text/javascript">
        window._AMapSecurityConfig = {
            securityJsCode: '6e844b4f91c859569af561240ae3dcf9',   // ⬅️ 在这里填入你的「安全密钥」（从高德应用详情获取）
        };
    </script>
    <script src="https://webapi.amap.com/maps?v=2.0&key=1ea92d862c6a02177889b87ddbaa2e15"></script>
    <!-- ================================================================= -->
</head>
<body>
    <h1>📍 我的旅游定位 + 地图</h1>
    <button onclick="getLocation()">点我获取当前位置</button>
    <div id="result">点击按钮后，结果会显示在这里...</div>
    <div id="mapContainer"></div>
    <div class="info">
        ⚠️ 请确保手机/电脑已开启定位功能，并允许浏览器获取位置。<br>
        🔑 本页面使用高德地图 Web服务 API 和 JS API，需要填入两个 Key。
    </div>

    <script>
        // ========== 请在这里填入你的高德 Web服务 Key ==========
        const AMAP_WEB_KEY = 'd6653d2caaaea2260d7d6b339a14c640';   // ⬅️ 用于逆地理编码（经纬度→城市）
        // =================================================

        let map = null;          // 地图实例
        let marker = null;       // 标记实例

        // 初始化地图（首次调用时创建）
        function initMap(lng, lat) {
            if (!map) {
                map = new AMap.Map('mapContainer', {
                    zoom: 16,                     // 缩放级别
                    center: [lng, lat],            // 设置中心点
                    viewMode: '2D',                 // 使用2D模式
                });
            } else {
                // 如果地图已存在，直接更新中心点
                map.setCenter([lng, lat]);
            }

            // 添加或更新标记
            if (marker) {
                marker.setPosition([lng, lat]);
            } else {
                marker = new AMap.Marker({
                    position: [lng, lat],
                    map: map
                });
            }
        }

        function getLocation() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '⏳ 正在获取位置，请稍候...';

            if (!navigator.geolocation) {
                resultDiv.innerHTML = '❌ 您的浏览器不支持地理定位';
                return;
            }

            navigator.geolocation.getCurrentPosition(
                // 定位成功
                function(position) {
                    const latitude = position.coords.latitude;   // 纬度
                    const longitude = position.coords.longitude; // 经度
                    const accuracy = position.coords.accuracy;   // 精度（米）

                    // 显示原始经纬度
                    resultDiv.innerHTML = `
                        ✅ 定位成功！<br>
                        纬度：${latitude}<br>
                        经度：${longitude}<br>
                        精度：约 ${accuracy} 米
                    `;

                    // 初始化/更新地图（注意高德使用 [经度, 纬度] 顺序）
                    initMap(longitude, latitude);

                    // 调用逆地理编码，获取城市名
                    convertToCity(latitude, longitude);
                },
                // 定位失败
                function(error) {
                    let message = '';
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            message = '❌ 用户拒绝了定位请求（请检查浏览器权限设置）';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            message = '❌ 无法获取当前位置（可能信号不好）';
                            break;
                        case error.TIMEOUT:
                            message = '❌ 定位超时，请稍后重试';
                            break;
                        default:
                            message = '❌ 未知错误';
                    }
                    resultDiv.innerHTML = message;
                },
                // 定位配置
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }

        // 逆地理编码：经纬度 → 城市名
        function convertToCity(lat, lng) {
            const resultDiv = document.getElementById('result');
            
            // 高德地图逆地理编码 API 需要参数 location=经度,纬度
            const url = `https://restapi.amap.com/v3/geocode/regeo?output=json&location=${lng},${lat}&key=${AMAP_WEB_KEY}&radius=1000&extensions=all`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.status === '1' && data.regeocode) {
                        const address = data.regeocode.formatted_address;      // 完整地址
                        const city = data.regeocode.addressComponent.city;    // 城市名
                        const province = data.regeocode.addressComponent.province; // 省份
                        const locationName = city || province || address;
                        
                        resultDiv.innerHTML += `<br>🏙️ 所在城市：${locationName}`;
                        resultDiv.innerHTML += `<br>📍 详细地址：${address}`;
                    } else {
                        console.error('逆地理编码失败', data);
                        resultDiv.innerHTML += `<br>❌ 无法获取城市信息，错误信息：${data.info || '未知错误'}`;
                    }
                })
                .catch(err => {
                    console.error('请求失败', err);
                    resultDiv.innerHTML += `<br>❌ 网络请求失败，请检查控制台`;
                });
        }
    </script>
</body>
</html>
